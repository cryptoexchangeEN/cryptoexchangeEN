<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFOF MAINNET ALPHA v6.0</title>
</head>
<body>
<div class="rfof-blockchain-system">
    <div class="system-header">
        <h2>RFOF MAINNET ALPHA v6.0</h2>
        <div id="global-timer" class="neon-text">TARGET: 14.08.2026</div>
    </div>

    <div id="auth-layer" class="module">
        <div class="label">SECURITY ACCESS</div>
        <input type="password" id="seed-phrase" placeholder="12-Wort Phrase..." class="rfof-input">
        <div class="btn-group">
            <button onclick="vault.access()">LOGIN / SYNC</button>
            <button onclick="vault.generate()" style="background:var(--magenta)">NEW VAULT</button>
        </div>
    </div>

    <div id="dashboard" class="module" style="display:none">
        <div class="wallet-head">
            <span id="display-addr">0x...</span>
            <button onclick="vault.logout()" class="small-btn">LOCK</button>
        </div>
        <div class="balance-grid">
            <div class="b-box">ECCU: <span id="bal-eccu">0.00</span></div>
            <div class="b-box">EURO: <span id="bal-euro">0.00 €</span></div>
        </div>
        <button id="mint-trigger" class="main-action">EXECUTE PZQQET MINT (J)</button>
    </div>

    <div class="module explorer">
        <div class="label">BLOCKCHAIN EXPLORER</div>
        <div id="blockchain-track" class="chain-visual"></div>
    </div>
</div>

<div class="eccu-master-container" id="prai-core-root" style="border: 2px solid #00f2ff; background: #000; padding: 20px; color: #fff; border-radius: 8px; margin-top: 20px; max-width: 600px; margin: auto;">
    <div style="border-bottom: 2px solid #222; padding-bottom: 10px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="font-size: 1.1rem; color: #00f2ff; font-weight: bold;">PZQQET MASTER CORE v42</div>
            <button id="view-toggle-btn" onclick="toggleView()" style="display:none; background: #111; color: #00ff41; border: 1px solid #00ff41; font-size: 0.6rem; cursor: pointer;">ADMIN VIEW</button>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px;">
            <span id="s-auth" style="font-size: 0.5rem; border: 1px solid #555; padding: 2px;">AUTH: LOGGED OUT</span>
            <span id="s-role" style="font-size: 0.5rem; border: 1px solid #555; padding: 2px;">ROLE: USER</span>
        </div>
    </div>

    <div id="core-viewport" style="margin-top: 20px;">
        <div id="view-user" style="display: block;">
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                <div style="border: 1px solid #333; padding: 5px;">RFOF: <span id="u-rfof">0.00</span></div>
                <div style="border: 1px solid #333; padding: 5px;">PRAI: <span id="u-prai">0.00</span></div>
                <div style="border: 1px solid #333; padding: 5px;">ECCU: <span id="u-eccu">0.00</span></div>
            </div>
        </div>
        <div id="view-admin" style="display: none; border: 2px dashed #00ff41; padding: 15px;">
            <div style="color: #00ff41; margin-bottom: 5px;">[ADMIN CONSOLE]</div>
            <input type="text" id="asset-name" placeholder="Asset Name..." style="width: 100%; background: #000; color: #fff;">
            <button onclick="adminMint()" style="width: 100%; margin-top: 5px; background: #00ff41; color:#000; font-weight:bold;">DEPLOY / MINT</button>
        </div>
    </div>
</div>

<div id="architect-core" class="module" style="display:none; border: 2px solid #ff00ff; max-width: 600px; margin: 20px auto; background: #050005; padding: 20px; color: #fff; border-radius: 8px;">
    <div style="font-weight: bold; color: #ff00ff; font-family: monospace;">[PZQQET ARCHITECT CORE v42]</div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
        <input type="text" id="arch-asset" placeholder="Asset Name/Hash..." style="background:#000; color:#fff; border:1px solid #333; padding:5px;">
        <button onclick="architect.mintAction()" style="background:#00ff41; color:#000; cursor:pointer;">FORCE MINT</button>
        <button onclick="architect.burnAction()" style="background:#ff0000; color:#fff; cursor:pointer;">BURN ASSET</button>
    </div>
</div>

<style>
    :root { --neon: #00f2ff; --magenta: #ff00ff; --bg: #000; --text: #fff; }
    .rfof-blockchain-system { background: var(--bg); color: var(--text); padding: 15px; border: 2px solid var(--neon); border-radius: 12px; font-family: monospace; max-width: 600px; margin: auto; }
    .module { background: #080808; border: 1px solid #222; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
    .rfof-input { width: 100%; padding: 8px; background: #000; border: 1px solid var(--neon); color: #fff; margin-bottom: 5px; }
    .main-action { width: 100%; padding: 15px; background: var(--neon); border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
    .chain-visual { display: flex; gap: 10px; overflow-x: auto; padding: 10px; }
    .balance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 5px; }
    .b-box { background: #151515; padding: 10px; border: 1px solid #333; text-align: center; }
</style>

<script>
const MASTER_ADMIN = "RFOF-46D65B1C4A8A4FA3E3B6";

/* --- LOGIK-ADAPTER --- */
setInterval(() => {
    const addr = localStorage.getItem("current_wallet_address");
    const isMaster = (addr === MASTER_ADMIN);
    const isAdminView = (document.getElementById('view-admin').style.display === 'block');

    // Sichtbarkeit: ARCHITECT CORE nur bei Admin-Rolle UND aktiver Admin-View
    const architectCore = document.getElementById('architect-core');
    architectCore.style.display = (isMaster && isAdminView) ? 'block' : 'none';

    // UI-Updates
    document.getElementById('view-toggle-btn').style.display = isMaster ? 'block' : 'none';
}, 200);

function toggleView() {
    const vU = document.getElementById('view-user');
    const vA = document.getElementById('view-admin');
    const isShowingAdmin = (vA.style.display === 'block');
    vU.style.display = isShowingAdmin ? 'block' : 'none';
    vA.style.display = isShowingAdmin ? 'none' : 'block';
}

// ... Rest der Logik bleibt unverändert ...
const vault = {
    async access() { 
        // Für den Test: Simulierter Admin-Login
        localStorage.setItem("current_wallet_address", MASTER_ADMIN); 
        location.reload(); 
    },
    logout() { localStorage.removeItem("current_wallet_address"); location.reload(); }
};
</script>
</body>
</html>
