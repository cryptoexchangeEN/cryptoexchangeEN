<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFOF MAINNET ALPHA v6.0 - FINALIZED</title>
</head>
<body>
<div class="rfof-blockchain-system">
    <div class="system-header">
        <h2>RFOF MAINNET ALPHA v6.0</h2>
        <div id="global-timer" class="neon-text">TARGET: 14.08.2026</div>
    </div>

    <div id="auth-layer" class="module">
        <div class="label">SECURITY ACCESS</div>
        <input type="password" id="seed-phrase" placeholder="12-Wort Phrase..." class="rfof-input">
        <div class="btn-group">
            <button onclick="vault.access()">LOGIN / SYNC</button>
            <button onclick="vault.generate()" style="background:var(--magenta)">NEW VAULT</button>
        </div>
    </div>

    <div id="dashboard" class="module" style="display:none">
        <div class="wallet-head">
            <span id="display-addr">0x...</span>
            <button onclick="vault.logout()" class="small-btn">LOCK</button>
        </div>
        <div class="balance-grid">
            <div class="b-box">ECCU: <span id="bal-eccu">0.00</span></div>
        </div>
    </div>
</div>

<div class="eccu-master-container" id="prai-core-root" style="border: 2px solid #00f2ff; background: #000; padding: 20px; color: #fff; margin: 20px auto; max-width: 600px;">
    <div style="display: flex; justify-content: space-between;">
        <span>PZQQET MASTER CORE v42</span>
        <button id="view-toggle-btn" onclick="toggleView()" style="display:none;">ADMIN VIEW</button>
    </div>
    <div id="view-user" style="display: block;">
        RFOF: <span id="u-rfof">0.00</span> | PRAI: <span id="u-prai">0.00</span>
    </div>
    <div id="view-admin" style="display: none; border: 1px dashed #00ff41; padding: 10px;">
        [ADMIN CONSOLE]
        <button onclick="adminMint()">DEPLOY / MINT</button>
    </div>
</div>

<div id="global-explorer" class="module" style="display:none; border: 2px solid #fff; max-width: 600px; margin: 20px auto; background: #000; padding: 20px; color: #fff;">
    <div class="label">GLOBAL BLOCKCHAIN EXPLORER</div>
    <div id="chain-data-view" style="font-size: 0.7rem; color: #00ff41; height: 100px; overflow-y: auto;"></div>
</div>

<style>
    :root { --neon: #00f2ff; --magenta: #ff00ff; }
    .rfof-blockchain-system { color: #fff; padding: 15px; border: 2px solid var(--neon); max-width: 600px; margin: auto; }
    .module { background: #080808; padding: 12px; border: 1px solid #222; margin-bottom: 10px; }
    .rfof-input { width: 100%; background: #000; border: 1px solid var(--neon); color: #fff; }
</style>

<script>
const MASTER_ADMIN = "RFOF-46D65B1C4A8A4FA3E3B6";

const vault = {
    async access() { 
        const seed = document.getElementById('seed-phrase').value; 
        if(seed.length < 5) return; 
        // Hash-Logik wie vorher
        const addr = "RFOF-" + (await crypto.subtle.digest('SHA-256', new TextEncoder().encode(seed)))
            .then(buf => Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('')).then(h => h.substring(0, 20).toUpperCase());
        localStorage.setItem("current_wallet_address", addr); 
        location.reload(); 
    },
    generate() { document.getElementById('seed-phrase').value = Math.random().toString(36).substring(2, 15); },
    logout() { localStorage.removeItem("current_wallet_address"); location.reload(); }
};

// Initialisierung bei Laden
window.onload = () => {
    const addr = localStorage.getItem("current_wallet_address");
    if(addr) {
        document.getElementById('auth-layer').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('display-addr').innerText = addr;
        document.getElementById('global-explorer').style.display = 'block';
    }
};

function toggleView() {
    const vU = document.getElementById('view-user');
    const vA = document.getElementById('view-admin');
    vU.style.display = (vA.style.display === 'block') ? 'block' : 'none';
    vA.style.display = (vA.style.display === 'block') ? 'none' : 'block';
}

// Intervall für Explorer-Sync
setInterval(() => {
    const addr = localStorage.getItem("current_wallet_address");
    document.getElementById('view-toggle-btn').style.display = (addr === MASTER_ADMIN) ? 'block' : 'none';
    
    const fullChain = JSON.parse(localStorage.getItem('rfof_chain') || "[]");
    document.getElementById('chain-data-view').innerText = fullChain.length > 0 ? JSON.stringify(fullChain, null, 2) : "SYSTEM READY - NO BLOCKS";
}, 1000);
</script>
</body>
</html>
